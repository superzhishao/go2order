version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: mysql+aiomysql://root:go2run2024@db:3306/go2run_drink?charset=utf8mb4
      SECRET_KEY: go2run-drink-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: go2run2024
      MYSQL_DATABASE: go2run_drink
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgo2run2024"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysqldata:
